name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --------------------------------------------------------------------------
  # Build + test matrix
  # --------------------------------------------------------------------------
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cmake_extra: -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          - os: macos-latest
            cmake_extra: -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          - os: windows-latest
            cmake_extra: ""

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang clang-tidy \
            libwayland-dev libxkbcommon-dev wayland-protocols \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev \
            libxi-dev libxinerama-dev libxxf86vm-dev libxss-dev \
            libvulkan-dev libpulse-dev libasound2-dev \
            libxtst-dev \
            ninja-build

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Set up MSVC + Ninja (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Vulkan SDK (Windows)
        if: runner.os == 'Windows'
        uses: humbletim/setup-vulkan-sdk@v1.2.1
        with:
          vulkan-query-version: 1.3.290.0
          vulkan-components: Vulkan-Headers, Vulkan-Loader
          vulkan-use-cache: true

      - name: Set up ccache
        if: runner.os != 'Windows'
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-cmake
          max-size: 500M

      - name: Cache Slang prebuilt
        uses: actions/cache@v4
        with:
          path: build/release/_deps
          key: slang-${{ runner.os }}-2026.12

      - name: Configure
        run: cmake --preset release ${{ matrix.cmake_extra }}

      - name: Build
        run: cmake --build --preset release --parallel

      # Build the offline tools explicitly so a tool link break is attributed to
      # a named step (they are also part of `all`, so the step above already
      # compiles them; this is for failure isolation + clarity).
      - name: Build offline tools
        run: cmake --build --preset release --target level_convert asset_cook --parallel

      # Runs all ctest suites INCLUDING the ds_smoke headless smoke target
      # (registered as a ctest in tests/CMakeLists.txt), which constructs the
      # device-independent engine subsystems without a GPU.
      - name: Run tests (incl. ds_smoke)
        run: ctest --test-dir build/release --output-on-failure

      # Exercise the asset cook pipeline headlessly on one platform (the tools
      # are OS-independent, so Linux coverage is sufficient and avoids the
      # Windows .exe-suffix path handling). The level_convert `cmp` asserts the
      # text->.dslv round-trip still matches the committed arena.dslv.
      - name: Cook sample assets
        if: matrix.os == 'ubuntu-latest'
        run: |
          set -e
          TOOLS=build/release/tools
          mkdir -p build/release/cooked
          "$TOOLS/level_convert" build/release/cooked/arena.dslv assets/levels/arena.txt
          cmp assets/levels/arena.dslv build/release/cooked/arena.dslv
          "$TOOLS/asset_cook" assets/textures/sample.png build/release/cooked/sample.dstex

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: doomscroller-${{ matrix.os }}
          path: |
            build/release/bin/DoomScroller*
            build/release/tools/level_convert*
            build/release/tools/asset_cook*
            build/release/shaders/**
            build/release/cooked/**
          if-no-files-found: warn
          retention-days: 14

  # --------------------------------------------------------------------------
  # clang-format check
  # --------------------------------------------------------------------------
  format:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: Check formatting
        run: |
          find engine game tests \
            \( -name '*.cpp' -o -name '*.h' \) \
            ! -path '*/extern/*' \
            | xargs clang-format --dry-run --Werror

  # --------------------------------------------------------------------------
  # clang-tidy (Linux only - needs compile_commands.json)
  # --------------------------------------------------------------------------
  tidy:
    name: clang-tidy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang clang-tidy \
            libwayland-dev libxkbcommon-dev wayland-protocols \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev \
            libxi-dev libxinerama-dev libxxf86vm-dev libxss-dev \
            libvulkan-dev libpulse-dev libasound2-dev \
            libxtst-dev \
            ninja-build

      - name: Cache Slang prebuilt
        uses: actions/cache@v4
        with:
          path: build/release/_deps
          key: slang-Linux-2026.12

      - name: Configure
        run: cmake --preset release

      - name: Run clang-tidy
        run: |
          find engine/include engine/src \
            \( -name '*.cpp' -o -name '*.h' \) \
            ! -path '*/rhi/sdl3/*' \
            | xargs clang-tidy \
              -p build/release \
              --warnings-as-errors='*'
